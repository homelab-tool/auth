#:schema https://json.schemastore.org/any.json

env_files = [".env.local"]
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
args_bin = []
cmd = "make build"
bin = "./bin/auth"
entrypoint = ["./bin/auth"]
delay = 1000
exclude_dir = [
    "tmp",
    "testdata",
    "test-results",
    "test",
    "node_modules",
    "playwright-report",
    "docs",
    "internal/server/pages/static/dist",
]
exclude_file = []
exclude_regex = ["_test.go", ".*_templ.go"]
include_dir = []
include_ext = ["go", "templ", "html", "ts", "css"]
include_file = []
exclude_unchanged = false
follow_symlink = false
full_bin = ""
ignore_dangerous_root_dir = false
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = []
rerun = false
rerun_delay = 500
send_interrupt = false
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
mode = ""
runner = "green"
watcher = "cyan"

[log]
main_only = false
silent = false
time = false

[misc]
clean_on_exit = false

[proxy]
enabled = true
app_port = 1337
proxy_port = 8080
app_start_timeout = 0

[screen]
clear_on_rebuild = false
keep_scroll = true
